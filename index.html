<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPulse - انضم إلينا</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hidden { display: none; }
        #welcome-screen { text-align: center; padding: 40px; }
        .logout-link { 
            display: block; 
            margin-top: 20px; 
            color: #d4af37; 
            text-decoration: underline; 
            cursor: pointer; 
            font-size: 14px;
        }
        /* إضافة تسميات العناوين فوق مجموعات الاختيار */
        label.section-title {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #d4af37;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- كارت التسجيل الرئيسي -->
    <div class="signup-card" id="signup-card">
        <h1>إنشاء حساب جديد</h1>
        <p>ادخل بياناتك لبدء رحلة التغيير</p>

        <form id="regForm">
            <div class="input-group">
                <input type="text" id="fname" placeholder="الاسم الأول" required>
                <input type="text" placeholder="اسم العائلة" required>
            </div>

            <div class="input-group">
                <input type="number" placeholder="الوزن (كجم)" required>
                <input type="number" placeholder="الطول (سم)" required>
            </div>

            <label class="section-title">مكان التمرين:</label>
            <div class="selection-group">
                <label class="option-container"> الجيم <input type="radio" name="place" value="الجيم" required> <span class="checkmark"></span> </label>
                <label class="option-container"> البيت <input type="radio" name="place" value="البيت"> <span class="checkmark"></span> </label>
            </div>

            <!-- القسم الجديد: المستوى الرياضي -->
            <label class="section-title">مستواك الحالي:</label>
            <div class="selection-group">
                <label class="option-container"> مبتدئ <input type="radio" name="level" value="مبتدئ" required> <span class="checkmark"></span> </label>
                <label class="option-container"> متوسط <input type="radio" name="level" value="متوسط"> <span class="checkmark"></span> </label>
                <label class="option-container"> محترف <input type="radio" name="level" value="محترف"> <span class="checkmark"></span> </label>
            </div>

            <label class="section-title">هدفك الرياضي:</label>
            <div class="selection-group">
                <label class="option-container"> تخسيس <input type="radio" name="goal" value="تخسيس" required> <span class="checkmark"></span> </label>
                <label class="option-container"> تضخيم <input type="radio" name="goal" value="تضخيم"> <span class="checkmark"></span> </label>
                <label class="option-container"> لياقة <input type="radio" name="goal" value="لياقة"> <span class="checkmark"></span> </label>
            </div>

            <input type="password" id="password" placeholder="كلمة السر (8 خانات أو أكثر)" required minlength="8">

            <button type="submit" class="btn-submit">إنشاء الحساب</button>
        </form>
    </div>

    <!-- شاشة الترحيب -->
    <div id="welcome-screen" class="signup-card hidden">
        <h1 style="font-size: 50px;">💪</h1>
        <h2 id="user-greeting"></h2>
        <p id="user-info-summary"></p>
        <button class="btn-submit">ابدأ التمرين الآن</button>
        <span class="logout-link" onclick="logout()">تسجيل الخروج (مسح البيانات)</span>
    </div>

    <script>
        window.onload = function() {
            const savedName = localStorage.getItem('userName');
            const savedLevel = localStorage.getItem('userLevel');
            if (savedName) {
                showWelcomeScreen(savedName, savedLevel);
            }
        };

        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault(); 
            
            const name = document.getElementById('fname').value;
            const pass = document.getElementById('password').value;
            // جلب المستوى المختار
            const level = document.querySelector('input[name="level"]:checked').value;

            // حفظ البيانات
            localStorage.setItem('userName', name);
            localStorage.setItem('userPass', pass);
            localStorage.setItem('userLevel', level);

            showWelcomeScreen(name, level);
        };

        function showWelcomeScreen(name, level) {
            document.getElementById('signup-card').classList.add('hidden');
            document.getElementById('welcome-screen').classList.remove('hidden');
            document.getElementById('user-greeting').innerText = "عاش يا " + name + "!";
            document.getElementById('user-info-summary').innerText = "مستواك الحالي: " + (level || "غير محدد") + ". استعد للتمارين!";
        }

        function logout() {
            localStorage.clear(); // مسح كل البيانات المحفوظة
            location.reload();
        }
    </script>

</body>
</html>
