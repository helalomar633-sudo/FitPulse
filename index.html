<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPulse - انضم إلينا</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hidden { display: none; }
        #welcome-screen { text-align: center; padding: 40px; }
    </style>
</head>
<body>

    <!-- كارت التسجيل الرئيسي -->
    <div class="signup-card" id="signup-card">
        <h1>إنشاء حساب جديد</h1>
        <p>ادخل بياناتك لبدء رحلة التغيير</p>

        <form id="regForm">
            <div class="input-group">
                <input type="text" id="fname" placeholder="الاسم الأول" required>
                <input type="text" placeholder="اسم العائلة" required>
            </div>

            <div class="input-group">
                <input type="number" placeholder="الوزن (كجم)" required>
                <input type="number" placeholder="الطول (سم)" required>
            </div>

            <label>مكان التمرين:</label>
            <div class="selection-group">
                <label class="option-container"> الجيم <input type="radio" name="place" required> <span class="checkmark"></span> </label>
                <label class="option-container"> البيت <input type="radio" name="place"> <span class="checkmark"></span> </label>
            </div>

            <label>هدفك الرياضي:</label>
            <div class="selection-group">
                <label class="option-container"> تخسيس <input type="radio" name="goal" required> <span class="checkmark"></span> </label>
                <label class="option-container"> تضخيم <input type="radio" name="goal"> <span class="checkmark"></span> </label>
                <label class="option-container"> لياقة <input type="radio" name="goal"> <span class="checkmark"></span> </label>
            </div>

            <input type="password" placeholder="كلمة السر (8 خانات أو أكثر)" required minlength="8">

            <button type="submit" class="btn-submit">إنشاء الحساب</button>
        </form>
    </div>

    <!-- شاشة الترحيب (مخفية في البداية) -->
    <div id="welcome-screen" class="signup-card hidden">
        <h1 style="font-size: 50px;">💪</h1>
        <h2 id="user-greeting"></h2>
        <p>تم حفظ بياناتك.. استعد للتمارين!</p>
        <button class="btn-submit" onclick="location.reload()">العودة للرئيسية</button>
    </div>

    <script>
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault(); // منع الصفحة من التحميل
            const name = document.getElementById('fname').value;
            
            // إخفاء التسجيل وإظهار الترحيب
            document.getElementById('signup-card').classList.add('hidden');
            document.getElementById('welcome-screen').classList.remove('hidden');
            
            // كتابة اسم المستخدم
            document.getElementById('user-greeting').innerText = "عاش يا " + name + "!";
        };
    </script>

</body>
</html>
